name: AWS CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REPO: aws-cicd-app

jobs:

  # ── Job 1: Test ─────────────────────────────────────────
  test:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Lint Shell Scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/build.sh
          shellcheck scripts/deploy.sh
          shellcheck scripts/rollback.sh
          shellcheck scripts/health_check.sh
          echo "✅ All scripts passed lint check"

      - name: Validate AWS CLI is available
        run: aws --version

  # ── Job 2: Build & Push Docker Image ────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh $ECR_REGISTRY/$ECR_REPO $IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG" >> $GITHUB_ENV

  # ── Job 3: Deploy to EC2 ────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh $EC2_HOST $IMAGE_TAG

      - name: Health Check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          chmod +x scripts/health_check.sh
          ./scripts/health_check.sh $EC2_HOST

      - name: Rollback on Failure
        if: failure()
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "❌ Deploy failed! Rolling back..."
          chmod +x scripts/rollback.sh
          ./scripts/rollback.sh $EC2_HOST
